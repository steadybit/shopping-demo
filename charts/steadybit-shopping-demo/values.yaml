# Default values for shopping-demo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
global:
  podAnnotations: {}
  # Endpoints for services to use
  endpoints:
    bestsellerFashion: "http://fashion-bestseller:8082/products"
    bestsellerToys: "http://toys-bestseller:8081/products"
    hotDeals: "http://hot-deals:8083/products"
    checkout: "http://checkout:8085/checkout"
    inventory: "http://inventory:8084/inventory"
gateway:
  enabled: true
  # Container image
  image:
    # Container image name
    name: ghcr.io/steadybit/gateway
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of gateway replicas
  replicaCount: 1
  service:
    # Service type, put to ClusterIP for OpenShift
    type: LoadBalancer
  # Ingress configuration
  ingress:
    # Standard ingress configuration
    enabled: true  # Set to false to disable the standard ingress
    # Hostname for the ingress
    host: null
    # Annotations for the ingress
    annotations:
    # HAProxy configuration
    haproxy:
      enabled: false  # Set to true to install HAProxy and create an ingress for gateway
      host: null  # Custom host for HAProxy ingress (if null, uses gateway.ingress.host)
    # OpenShift ingress configuration
    openshift:
      enabled: false  # Set to true to enable OpenShift ingress
      host: null  # Hostname for OpenShift ingress
      annotations: {}
      tls:
        enabled: false
        secretName: gateway-tls-secret
    # Enterprise Nginx ingress configuration
    nginx:
      enabled: false  # Set to true to enable Nginx ingress
      host: null  # Custom host for Nginx ingress (if null, uses gateway.ingress.host)
      annotations: {}
      tls:
        enabled: false
        secretName: gateway-nginx-tls-secret
  # Gateway API HTTPRoute configuration
  httpRoute:
    enabled: false  # Set to true to create an HTTPRoute resource (requires Gateway API CRDs)
    host: null  # Hostname for the HTTPRoute (if null, uses gateway.ingress.host)
    annotations: {}
    parentRefs:
      name: ""  # Name of the Gateway resource to attach to
      namespace: null  # Namespace of the Gateway resource (if different from release namespace)
      sectionName: null  # Specific listener name on the Gateway
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
bestsellerFashion:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/bestseller-fashion
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of bestsellerFashion replicas
  replicaCount: 1
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
bestsellerToys:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/bestseller-toys-go
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of bestsellerToys replicas
  replicaCount: 1
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
hotDeals:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/hot-deals
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Container nginx resources
  nginx:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
        ephemeral-storage: "100Mi"
      limits:
        memory: "1024Mi"
        cpu: "500m"
        ephemeral-storage: "500Mi"
  # Number of hotDeals replicas
  replicaCount: 1
  # Enable podAffinity
  podAffinity: false
  # Service type
  service:
    type: NodePort
  # Enable podDisruptionBudget
  podDisruptionBudget: false
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
inventory:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/inventory-go
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of inventory replicas
  replicaCount: 1
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
activemq:
  enabled: true
  image:
    # Container image name
    name: symptoma/activemq
    # Container image tag
    tag: 5.18.3
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of activemq replicas
  replicaCount: 1
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
checkout:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/checkout-go
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
      ephemeral-storage: "250Mi"
    limits:
      memory: "1024Mi"
      cpu: "250m"
      ephemeral-storage: "500Mi"
  # Number of checkout replicas
  replicaCount: 1
  # Enable horizontalPodAutoscaler
  horizontalPodAutoscaler: false
  # Enable podDisruptionBudget
  podDisruptionBudget: false
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
  activeMQ:
    # ActiveMQ Host
    host: "activemq:61613"
orders:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/orders-go
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
      ephemeral-storage: "250Mi"
    limits:
      memory: "1024Mi"
      cpu: "500m"
      ephemeral-storage: "500Mi"
  # Number of orders replicas
  replicaCount: 1
  # Enable podAffinity
  podAffinity: false
  # Enable podDisruptionBudget
  podDisruptionBudget: false
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}
  activeMQ:
    # ActiveMQ Host
    host: "activemq:61613"

# Redis configuration (opt-in). Set redis.enabled=true to deploy Redis via Bitnami subchart.
redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: "32Mi"
        cpu: "10m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Kafka configuration (opt-in). Set kafka.enabled=true to deploy Kafka via Bitnami subchart.
kafka:
  enabled: false
  controller:
    replicaCount: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "50m"
      limits:
        memory: "512Mi"
        cpu: "250m"
    heapOpts: "-Xmx256m -Xms256m"
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT

# RabbitMQ configuration (opt-in). Set rabbitmq.enabled=true to deploy RabbitMQ via Bitnami subchart.
rabbitmq:
  enabled: false
  auth:
    username: guest
    password: guest
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# Notification service (opt-in, requires rabbitmq.enabled=true)
notification:
  enabled: true
  image:
    # Container image name
    name: ghcr.io/steadybit/notification-go
    # Container image tag
    tag: develop
  # Container resources
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "256Mi"
      cpu: "250m"
      ephemeral-storage: "500Mi"
  # Number of notification replicas
  replicaCount: 1
  # nodeSelector -- Node labels for pod assignment
  nodeSelector: {}

# configuration for the HAProxy ingress controller for the gateway. See gateway.ingress.haproxy.enabled to enable it
haproxy:
  controller:
    service:
      type: LoadBalancer
