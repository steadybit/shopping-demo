{{- if and .Values.gateway.enabled .Values.gateway.ingress.haproxy.enabled .Values.gateway.httpRoute.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haproxy-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.httpRoute.parentRefs.name }}
      {{- with .Values.gateway.httpRoute.parentRefs.namespace }}
      namespace: {{ . }}
      {{- end }}
      sectionName: http
  hostnames:
    - {{ .Values.gateway.ingress.haproxy.host | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
{{- end -}}
