{{- if and .Values.rabbitmq.enabled .Values.notification.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  labels:
    run: notification
    service-tier: "1"
    domain: "shop-notification"
    tags.datadoghq.com/service: shop-notification
    tags.datadoghq.com/version: 1.0.0
  name: notification
spec:
  replicas: {{ .Values.notification.replicaCount }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      run: notification
  template:
    metadata:
      labels:
        run: notification
        service-tier: "1"
        domain: "shop-notification"
        tags.datadoghq.com/service: shop-notification
        tags.datadoghq.com/version: 1.0.0
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: steadybit-demo
      containers:
        - image: {{ .Values.notification.image.name }}:{{ .Values.notification.image.tag }}
          resources: {{ toYaml .Values.notification.resources | nindent 14 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
          imagePullPolicy: Always
          name: notification
          ports:
            - containerPort: 8087
              protocol: TCP
          env:
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.auth.username }}:{{ .Values.rabbitmq.auth.password }}@{{ .Release.Name }}-rabbitmq:5672/"
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
      {{- with .Values.notification.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      imagePullSecrets:
        - name: regcredinternal
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  labels:
    run: notification
  name: notification
spec:
  ports:
    - port: 8087
      protocol: TCP
      targetPort: 8087
  selector:
    run: notification
  type: ClusterIP
{{- end -}}
