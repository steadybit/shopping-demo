version: '3.3'

services:
  gateway:
    image: steadybit/gateway:develop
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      "rest.endpoint.checkout": "http://checkout:8085"

  fashion:
    image: steadybit/bestseller-fashion:develop
    ports:
      - "8082:8082"
    environment:
      "rest.endpoint.inventory": "http://inventory:8084/inventory"

  toys:
    image: steadybit/bestseller-toys-go:develop
    ports:
      - "8081:8081"
    environment:
      "rest.endpoint.inventory": "http://inventory:8084/inventory"

  hot-deals:
    image: steadybit/hot-deals:develop
    ports:
      - "8083:8083"
    environment:
      "rest.endpoint.inventory": "http://inventory:8084/inventory"

  inventory:
    image: steadybit/inventory-go:develop
    ports:
      - "8084:8084"

  checkout:
    image: steadybit/checkout-go:develop
    ports:
      - "8085:8085"
    environment:
      "SPRING_ACTIVEMQ_BROKER_URL": "activemq:61613"
      # Uncomment to use Redis for cart storage instead of in-memory:
      # "REDIS_URL": "redis://redis:6379"
      # Uncomment to use Kafka instead of ActiveMQ for order publishing:
      # "KAFKA_BROKERS": "kafka:9092"
    depends_on:
      - activemq

  orders:
    image: steadybit/orders-go:develop
    environment:
      "ACTIVEMQ_BROKER_HOST": "activemq:61613"
      # Uncomment to use Kafka instead of ActiveMQ for order consuming:
      # "KAFKA_BROKERS": "kafka:9092"
      # Uncomment to forward orders to RabbitMQ for notification service:
      # "RABBITMQ_URL": "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      - activemq

  # Uncomment to enable Redis:
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"

  # Uncomment to enable RabbitMQ (required for notification service):
  # rabbitmq:
  #   image: rabbitmq:4-management-alpine
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"

  # Uncomment to enable the notification service (requires RabbitMQ):
  # notification:
  #   image: steadybit/notification-go:develop
  #   ports:
  #     - "8087:8087"
  #   environment:
  #     "RABBITMQ_URL": "amqp://guest:guest@rabbitmq:5672/"
  #   depends_on:
  #     - rabbitmq

  # Uncomment to enable Kafka (KRaft mode, no Zookeeper):
  # kafka:
  #   image: bitnami/kafka:latest
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_CFG_NODE_ID: "0"
  #     KAFKA_CFG_PROCESS_ROLES: "broker,controller"
  #     KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
  #     KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
  #     KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
  #     KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
  #     KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  activemq:
    image: symptoma/activemq:latest
    container_name: 'activemq'
    ports:
      - "61616:61616"
      - "61613:61613"
      - "8161:8161"
    volumes:
      - ${PWD}/activemq.xml:/opt/activemq/conf/activemq.xml
